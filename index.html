<!DOCTYPE html>
<html>
<head>
    <title>Hadiah Untukmu!</title>
    <style>
        body { background: black; color: white; text-align: center; padding-top: 40vh; font-family: sans-serif; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>

    <h2>Ada pesan rahasia untukmu...</h2>
    <button onclick="mulaiPrank()">Klik untuk Buka</button>

    <audio id="suaraPrank" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Screaming+Ghost&filename=24/246341-2a1d7f1e-8e8e-4a4e-8e8e-2a1d7f1e8e8e.mp3"></audio>

    <script>
        function mulaiPrank() {
            var elem = document.documentElement;
            var audio = document.getElementById("suaraPrank");

            // Masuk ke Full Screen
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            }

            // Putar Suara
            audio.play();
            
            // Opsional: Ganti gambar jadi gambar seram
            document.body.innerHTML = "<img src='https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndnZ6Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKv9Q2YPFVp6YHm/giphy.gif' style='width:100vw; height:100vh;'>";
        }
    </script>
</body>
</html>
